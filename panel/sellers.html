<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sonu Mods | Reseller Management</title>

    <script>
        if (sessionStorage.getItem('sonu_admin') !== 'authenticated') {
            window.location.replace('index.html');
        }
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="../js/config.js"></script>

    <style>
        :root {
            --primary: #00f2ff; --secondary: #7000ff; --bg: #0a0b1e;
            --card-bg: rgba(22, 27, 51, 0.8); --text: #ffffff;
            --success: #00ff88; --danger: #ff3366; --warning: #ffaa00;
            --sidebar-width: 250px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body { background-color: var(--bg); color: var(--text); overflow-x: hidden; display: flex; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--warning); border-radius: 4px; }

        .sidebar { width: var(--sidebar-width); height: 100vh; background: var(--card-bg); border-right: 1px solid rgba(255, 170, 0, 0.15); position: fixed; top: 0; left: 0; padding: 20px 0; display: flex; flex-direction: column; z-index: 100; backdrop-filter: blur(20px); }
        .logo { text-align: center; font-size: 26px; font-weight: 800; margin-bottom: 40px; color: var(--warning); letter-spacing: 3px; }
        .nav-links { list-style: none; flex: 1; }
        .nav-links a { display: flex; align-items: center; padding: 15px 25px; color: rgba(255,255,255,0.7); text-decoration: none; border-left: 3px solid transparent; }
        .nav-links a:hover, .nav-links a.active { background: rgba(255, 170, 0, 0.1); color: var(--warning); border-left: 3px solid var(--warning); }
        .nav-icon { width: 22px; height: 22px; margin-right: 15px; fill: currentColor; }

        .main-content { margin-left: var(--sidebar-width); padding: 30px; width: calc(100% - var(--sidebar-width)); min-height: 100vh; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .header h2 { font-weight: 800; font-size: 32px; color: var(--warning); }

        .grid-layout { display: grid; grid-template-columns: 1fr 1.5fr; gap: 30px; }
        
        .panel-box { background: var(--card-bg); padding: 25px; border-radius: 15px; border: 1px solid rgba(255,170,0,0.2); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .panel-header { font-size: 20px; font-weight: 800; margin-bottom: 20px; color: white; display: flex; justify-content: space-between; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; }

        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 13px; color: rgba(255,255,255,0.8); margin-bottom: 8px; }
        .input-control { width: 100%; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 12px; border-radius: 8px; outline: none; }
        .input-control:focus { border-color: var(--warning); }
        
        .btn-action { width: 100%; padding: 14px; border: none; border-radius: 8px; background: linear-gradient(90deg, #ff6a00, var(--warning)); color: #000; font-weight: 800; cursor: pointer; transition: 0.3s; text-transform: uppercase; }
        .btn-action:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(255,170,0,0.4); }

        .table-wrapper { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 14px; }
        th { color: rgba(255,255,255,0.5); font-weight: 400; text-transform: uppercase; font-size: 12px; }
        .action-btn { background: rgba(255,255,255,0.1); color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 12px; transition: 0.3s; margin-right: 5px; }
        .action-btn:hover { background: var(--warning); color: black; }
        .del-btn:hover { background: var(--danger); color: white; }

        .req-card { background: rgba(0,0,0,0.4); border: 1px solid rgba(255,170,0,0.3); padding: 15px; border-radius: 10px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }

        @media (max-width: 768px) {
            .sidebar { width: 100%; height: 60px; top: auto; bottom: 0; flex-direction: row; padding: 0; }
            .logo { display: none; } .nav-links { display: flex; justify-content: space-around; width: 100%; }
            .nav-links a { padding: 10px; flex-direction: column; font-size: 10px; border: none; }
            .main-content { margin-left: 0; width: 100%; padding-bottom: 80px; }
            .grid-layout { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="logo">SONU MODS</div>
        <ul class="nav-links">
            <li><a href="dashboard.html"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg> Dashboard</a></li>
            <li><a href="ai.html"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M21 10.12h-6.78..."></path></svg> AI Controller</a></li>
            <li><a href="users.html"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M12 12c2.21..."></path></svg> User IDs</a></li>
            <li><a href="apps.html"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M4 8h4V4H4v4..."></path></svg> Apps Manager</a></li>
            <li><a href="sellers.html" class="active"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg> Resellers</a></li>
            <li><a href="keys.html"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M21 2H3c-1.1..."></path></svg> Keys</a></li>
        </ul>
    </aside>

    <main class="main-content">
        <header class="header">
            <h2>Reseller Management</h2>
        </header>

        <div class="grid-layout">
            <!-- ADD SELLER -->
            <div>
                <div class="panel-box" style="margin-bottom: 20px;">
                    <div class="panel-header">Create New Seller</div>
                    <form id="addSellerForm">
                        <div class="input-group">
                            <label>Username (Login ID)</label>
                            <input type="text" id="sUser" class="input-control" required autocomplete="off">
                        </div>
                        <div class="input-group">
                            <label>Password</label>
                            <input type="text" id="sPass" class="input-control" required autocomplete="off">
                        </div>
                        <div class="input-group">
                            <label>Full Name</label>
                            <input type="text" id="sName" class="input-control" required autocomplete="off">
                        </div>
                        <div class="input-group">
                            <label>Initial Key Quota</label>
                            <input type="number" id="sQuota" class="input-control" required value="50">
                        </div>
                        <button type="submit" class="btn-action">Add Seller</button>
                    </form>
                </div>

                <!-- QUOTA REQUESTS -->
                <div class="panel-box">
                    <div class="panel-header">Pending Quota Requests</div>
                    <div id="requestsBox">
                        <p style="color:rgba(255,255,255,0.4); font-size:14px;">No pending requests.</p>
                    </div>
                </div>
            </div>

            <!-- SELLERS LIST -->
            <div class="panel-box">
                <div class="panel-header">Registered Sellers</div>
                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th>Username</th>
                                <th>Name</th>
                                <th>Password</th>
                                <th>Quota Left</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="sellersTable">
                            <tr><td colspan="5" style="text-align:center;">Loading...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script>
        // Fetch Sellers
        db.ref('sellers').on('value', snap => {
            const table = document.getElementById('sellersTable');
            table.innerHTML = '';
            if(!snap.exists()) {
                table.innerHTML = '<tr><td colspan="5" style="text-align:center;">No sellers found.</td></tr>';
                return;
            }
            snap.forEach(child => {
                const s = child.val();
                table.innerHTML += `
                    <tr>
                        <td><strong style="color:var(--warning)">${s.username}</strong></td>
                        <td>${s.name}</td>
                        <td>${s.password}</td>
                        <td><strong style="font-size:18px;">${s.quota}</strong></td>
                        <td>
                            <button class="action-btn" onclick="addQuota('${s.username}', ${s.quota})">+ Quota</button>
                            <button class="action-btn del-btn" onclick="deleteSeller('${s.username}')">Del</button>
                        </td>
                    </tr>
                `;
            });
        });

        // Add Seller
        document.getElementById('addSellerForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const u = document.getElementById('sUser').value.trim();
            const p = document.getElementById('sPass').value.trim();
            const n = document.getElementById('sName').value.trim();
            const q = parseInt(document.getElementById('sQuota').value);

            db.ref(`sellers/${u}`).once('value').then(snap => {
                if(snap.exists()) return alert("Username already exists!");
                db.ref(`sellers/${u}`).set({
                    username: u, password: p, name: n, quota: q, created_at: Date.now()
                }).then(() => {
                    document.getElementById('addSellerForm').reset();
                });
            });
        });

        function deleteSeller(username) {
            if(confirm(`Delete seller ${username}? They won't be able to login.`)) {
                db.ref(`sellers/${username}`).remove();
            }
        }

        function addQuota(username, currentQuota) {
            const add = prompt(`How much quota to ADD to ${username}? (Current: ${currentQuota})`);
            if(!add || isNaN(add)) return;
            db.ref(`sellers/${username}/quota`).set(currentQuota + parseInt(add));
        }

        // Fetch Quota Requests
        db.ref('quota_requests').on('value', snap => {
            const box = document.getElementById('requestsBox');
            box.innerHTML = '';
            let hasReq = false;
            
            snap.forEach(child => {
                const r = child.val();
                if(r.status === 'pending') {
                    hasReq = true;
                    box.innerHTML += `
                        <div class="req-card">
                            <div>
                                <strong style="color:var(--warning)">${r.seller_id}</strong><br>
                                <span style="font-size:12px;">Requests: ${r.amount} Keys</span>
                            </div>
                            <div>
                                <button class="action-btn" style="background:var(--success); color:black;" onclick="approveReq('${child.key}', '${r.seller_id}', ${r.amount})">Approve</button>
                                <button class="action-btn del-btn" onclick="rejectReq('${child.key}')">Reject</button>
                            </div>
                        </div>
                    `;
                }
            });

            if(!hasReq) {
                box.innerHTML = '<p style="color:rgba(255,255,255,0.4); font-size:14px;">No pending requests.</p>';
            }
        });

        function approveReq(reqId, sellerId, amount) {
            db.ref(`sellers/${sellerId}/quota`).once('value').then(snap => {
                const current = snap.val() || 0;
                db.ref(`sellers/${sellerId}/quota`).set(current + amount).then(() => {
                    db.ref(`quota_requests/${reqId}/status`).set('approved');
                });
            });
        }

        function rejectReq(reqId) {
            db.ref(`quota_requests/${reqId}/status`).set('rejected');
        }
    </script>
</body>
</html>
