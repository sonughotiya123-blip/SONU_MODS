<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sonu Mods | Tokens Manager</title>

    <script>
        if (sessionStorage.getItem('sonu_admin') !== 'authenticated') {
            window.location.replace('index.html');
        }
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="../js/config.js"></script>

    <style>
        :root {
            --primary: #00f2ff; --secondary: #7000ff; --bg: #0a0b1e;
            --card-bg: rgba(22, 27, 51, 0.8); --text: #ffffff;
            --success: #00ff88; --danger: #ff3366; --warning: #ffaa00;
            --sidebar-width: 250px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body { background-color: var(--bg); color: var(--text); overflow-x: hidden; display: flex; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--secondary); border-radius: 4px; }

        .sidebar { width: var(--sidebar-width); height: 100vh; background: var(--card-bg); border-right: 1px solid rgba(0, 242, 255, 0.15); position: fixed; top: 0; left: 0; padding: 20px 0; display: flex; flex-direction: column; z-index: 100; backdrop-filter: blur(20px); }
        .logo { text-align: center; font-size: 26px; font-weight: 800; margin-bottom: 40px; background: linear-gradient(90deg, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .nav-links { list-style: none; flex: 1; }
        .nav-links a { display: flex; align-items: center; padding: 15px 25px; color: rgba(255,255,255,0.7); text-decoration: none; border-left: 3px solid transparent; }
        .nav-links a:hover, .nav-links a.active { background: rgba(0, 242, 255, 0.1); color: var(--primary); border-left: 3px solid var(--primary); }
        .nav-icon { width: 22px; height: 22px; margin-right: 15px; fill: currentColor; }

        .main-content { margin-left: var(--sidebar-width); padding: 30px; width: calc(100% - var(--sidebar-width)); min-height: 100vh; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .header h2 { font-weight: 800; font-size: 32px; }

        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: var(--card-bg); padding: 20px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); text-align: center; }
        .stat-value { font-size: 32px; font-weight: 800; margin-top: 5px; color: var(--secondary); }

        .top-bar { display: flex; justify-content: space-between; gap: 20px; margin-bottom: 25px; background: var(--card-bg); padding: 20px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); }
        
        .controls-group { display: flex; gap: 15px; align-items: center; }
        .input-control, select { background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 10px 15px; border-radius: 8px; outline: none; }
        
        .btn { padding: 10px 20px; border: none; border-radius: 8px; font-weight: 800; cursor: pointer; text-transform: uppercase; color: white; transition: 0.3s; }
        .btn-danger { background: rgba(255,51,102,0.2); border: 1px solid var(--danger); color: var(--danger); }
        .btn-danger:hover { background: var(--danger); color: white; }

        .table-container { background: var(--card-bg); border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); overflow-x: auto; padding: 20px; }
        table { width: 100%; border-collapse: collapse; min-width: 800px; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 14px; }
        th { color: rgba(255,255,255,0.5); font-weight: 600; text-transform: uppercase; font-size: 12px; }
        tr:hover { background: rgba(255,255,255,0.02); }
        
        .token-text { font-family: monospace; color: var(--secondary); font-size: 15px; font-weight: 800; }
        .badge { padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 800; text-transform: uppercase; }
        .badge-active { background: rgba(0,242,255,0.1); color: var(--primary); border: 1px solid rgba(0,242,255,0.3); }
        .badge-used { background: rgba(0,255,136,0.1); color: var(--success); border: 1px solid rgba(0,255,136,0.3); }
        .badge-expired { background: rgba(255,51,102,0.1); color: var(--danger); border: 1px solid rgba(255,51,102,0.3); }

        .btn-action { background: rgba(255,255,255,0.1); border: none; color: white; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 600; transition: 0.3s; margin-right: 5px; }
        .btn-action:hover { background: var(--primary); color: var(--bg); }
        .btn-action-del { background: rgba(255,51,102,0.1); color: var(--danger); }
        .btn-action-del:hover { background: var(--danger); color: white; }

        @media (max-width: 768px) {
            .sidebar { width: 100%; height: 60px; top: auto; bottom: 0; flex-direction: row; padding: 0; }
            .logo { display: none; }
            .nav-links { display: flex; justify-content: space-around; width: 100%; }
            .nav-links a { padding: 10px; flex-direction: column; font-size: 10px; border: none; }
            .main-content { margin-left: 0; width: 100%; padding-bottom: 80px; }
        }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="logo">SONU MODS</div>
        <ul class="nav-links">
            <li><a href="dashboard.html"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg> Dashboard</a></li>
            <li><a href="users.html"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg> User IDs</a></li>
            <li><a href="apps.html"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M4 8h4V4H4v4zm6 12h4v-4h-4v4zm-6 0h4v-4H4v4zm0-6h4v-4H4v4zm6 0h4v-4h-4v4zm6-10v4h4V4h-4zm-6 4h4V4h-4v4zm6 6h4v-4h-4v4zm0 6h4v-4h-4v4z"/></svg> Apps</a></li>
            <li><a href="keys.html"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M21 2H3c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-8 15h-2v-2h2v2zm0-4h-2V7h2v6zm5 4h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg> Keys</a></li>
            <li><a href="tokens.html" class="active"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg> Tokens</a></li>
            <li><a href="history.html"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M13 3c-4.97 0-9 4.03-9 9H1l3.89 3.89.07.14L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42C8.27 19.99 10.51 21 13 21c4.97 0 9-4.03 9-9s-4.03-9-9-9zm-1 5v5l4.28 2.54.72-1.21-3.5-2.08V8H12z"/></svg> History</a></li>
        </ul>
    </aside>

    <main class="main-content">
        <header class="header"><h2>Tokens Manager</h2></header>

        <div class="stats-grid">
            <div class="stat-card"><div>Total Tokens</div><div class="stat-value" id="statTotal">0</div></div>
            <div class="stat-card"><div>Active</div><div class="stat-value" id="statActive" style="color:var(--primary)">0</div></div>
            <div class="stat-card"><div>Redeemed</div><div class="stat-value" id="statRedeemed" style="color:var(--success)">0</div></div>
            <div class="stat-card"><div>Expired</div><div class="stat-value" id="statExpired" style="color:var(--danger)">0</div></div>
        </div>

        <div class="top-bar">
            <div class="controls-group">
                <input type="text" id="searchBox" class="input-control" placeholder="Search Token..." oninput="renderTable()" style="width: 250px;">
                <select id="filterStatus" onchange="renderTable()">
                    <option value="all">All Status</option>
                    <option value="active">Active (Unused)</option>
                    <option value="redeemed">Redeemed</option>
                    <option value="expired">Expired</option>
                </select>
            </div>
            
            <div class="controls-group" style="justify-content: flex-end;">
                <button class="btn btn-danger" onclick="deleteUsedTokens()">Del Redeemed</button>
                <button class="btn btn-danger" onclick="deleteExpiredTokens()">Del Expired</button>
                <button class="btn btn-danger" onclick="deleteAllTokens()">Del All</button>
            </div>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr><th>Token Code</th><th>App</th><th>Status</th><th>Expiry / Used At</th><th>Action</th></tr>
                </thead>
                <tbody id="tokensTableBody"><tr><td colspan="5">Loading...</td></tr></tbody>
            </table>
        </div>
    </main>

    <script>
        let tokensData = [];

        db.ref('shortner_tokens').on('value', snap => {
            tokensData = [];
            let total=0, active=0, redeemed=0, expired=0;
            const now = new Date();

            if(snap.exists()){
                snap.forEach(child => {
                    const t = child.val();
                    tokensData.push(t);
                    total++;

                    if(t.redeemed === 1) {
                        redeemed++;
                    } else if (new Date(t.token_expiry) < now) {
                        expired++;
                    } else {
                        active++;
                    }
                });
            }
            document.getElementById('statTotal').innerText = total;
            document.getElementById('statActive').innerText = active;
            document.getElementById('statRedeemed').innerText = redeemed;
            document.getElementById('statExpired').innerText = expired;
            renderTable();
        });

        function renderTable() {
            const search = document.getElementById('searchBox').value.toUpperCase();
            const fStatus = document.getElementById('filterStatus').value;
            
            const tbody = document.getElementById('tokensTableBody');
            tbody.innerHTML = '';

            const now = new Date();
            const filtered = tokensData.filter(t => {
                const matchSearch = t.token_code.includes(search);
                
                let curStatus = 'active';
                if(t.redeemed === 1) curStatus = 'redeemed';
                else if (new Date(t.token_expiry) < now) curStatus = 'expired';

                const matchStatus = fStatus === 'all' || fStatus === curStatus;
                return matchSearch && matchStatus;
            }).sort((a,b) => b.created_at - a.created_at);

            if(filtered.length === 0) return tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;">No tokens found.</td></tr>';

            filtered.forEach(t => {
                let statusHtml = '';
                let timeText = '';

                if(t.redeemed === 1) {
                    statusHtml = '<span class="badge badge-used">REDEEMED</span>';
                    timeText = new Date(t.redeemed_at).toLocaleString();
                } else if (new Date(t.token_expiry) < now) {
                    statusHtml = '<span class="badge badge-expired">EXPIRED</span>';
                    timeText = new Date(t.token_expiry).toLocaleString();
                } else {
                    statusHtml = '<span class="badge badge-active">ACTIVE</span>';
                    timeText = new Date(t.token_expiry).toLocaleString();
                }

                tbody.innerHTML += `<tr>
                    <td><span class="token-text">${t.token_code}</span></td>
                    <td>${t.app}</td>
                    <td>${statusHtml}</td>
                    <td style="color:rgba(255,255,255,0.5); font-size:12px;">${timeText}</td>
                    <td>
                        <button class="btn-action" onclick="copyToken('${t.token_code}')">Copy</button>
                        <button class="btn-action btn-action-del" onclick="deleteToken('${t.token_code}')">Del</button>
                    </td>
                </tr>`;
            });
        }

        function copyToken(text) {
            navigator.clipboard.writeText(text).then(() => alert(text + " Copied!"));
        }

        // SOFT DELETE LOGIC (Moves to history_tokens)
        function deleteToken(tokenCode) {
            if(!confirm("Move this token to History?")) return;
            moveAndRemove([tokenCode]);
        }

        function deleteUsedTokens() {
            if(!confirm("Move all REDEEMED tokens to History?")) return;
            const toDel = tokensData.filter(t => t.redeemed === 1).map(t => t.token_code);
            moveAndRemove(toDel);
        }

        function deleteExpiredTokens() {
            if(!confirm("Move all EXPIRED tokens to History?")) return;
            const now = new Date();
            const toDel = tokensData.filter(t => t.redeemed === 0 && new Date(t.token_expiry) < now).map(t => t.token_code);
            moveAndRemove(toDel);
        }

        function deleteAllTokens() {
            if(!confirm("WARNING: Move ALL tokens to History?")) return;
            const toDel = tokensData.map(t => t.token_code);
            moveAndRemove(toDel);
        }

        function moveAndRemove(tokenArray) {
            if(tokenArray.length === 0) return alert("No tokens found to move.");
            const updates = {};
            const ts = Date.now();
            
            tokenArray.forEach(tcode => {
                const data = tokensData.find(t => t.token_code === tcode);
                if(data) {
                    data.deleted_at = ts;
                    updates[`history_tokens/${tcode}`] = data; // Move to history
                    updates[`shortner_tokens/${tcode}`] = null; // Delete from active
                }
            });

            db.ref().update(updates).then(() => alert(`Moved ${tokenArray.length} token(s) to History.`));
        }
    </script>
</body>
</html>
