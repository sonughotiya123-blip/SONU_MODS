<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sonu Mods | Feedback Logs</title>

    <script>
        if (sessionStorage.getItem('sonu_admin') !== 'authenticated') {
            window.location.replace('index.html');
        }
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="../js/config.js"></script>

    <style>
        :root {
            --primary: #00f2ff;
            --secondary: #7000ff;
            --bg: #0a0b1e;
            --card-bg: rgba(22, 27, 51, 0.8);
            --text: #ffffff;
            --sidebar-width: 250px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        
        body { background-color: var(--bg); color: var(--text); overflow-x: hidden; display: flex; }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--secondary); border-radius: 4px; }

        /* --- SIDEBAR --- */
        .sidebar {
            width: var(--sidebar-width); height: 100vh; background: var(--card-bg);
            border-right: 1px solid rgba(0, 242, 255, 0.15); position: fixed; top: 0; left: 0;
            padding: 20px 0; display: flex; flex-direction: column; z-index: 100;
            backdrop-filter: blur(20px); box-shadow: 5px 0 20px rgba(0,0,0,0.5);
        }
        .logo {
            text-align: center; font-size: 26px; font-weight: 800; margin-bottom: 40px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: 3px;
        }
        .nav-links { list-style: none; flex: 1; }
        .nav-links li { margin-bottom: 5px; }
        .nav-links a {
            display: flex; align-items: center; padding: 15px 25px; color: rgba(255,255,255,0.7);
            text-decoration: none; font-weight: 400; transition: all 0.3s ease; border-left: 3px solid transparent;
        }
        .nav-links a:hover, .nav-links a.active {
            background: rgba(0, 242, 255, 0.1); color: var(--primary);
            border-left: 3px solid var(--primary); box-shadow: inset 10px 0 20px rgba(0, 242, 255, 0.05);
        }
        .nav-icon { width: 22px; height: 22px; margin-right: 15px; fill: currentColor; }

        /* --- MAIN CONTENT --- */
        .main-content {
            margin-left: var(--sidebar-width); padding: 30px;
            width: calc(100% - var(--sidebar-width)); min-height: 100vh;
            background-image: radial-gradient(circle at top right, rgba(112, 0, 255, 0.1), transparent 40%);
        }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .header h2 { font-weight: 800; font-size: 32px; }

        .controls-bar {
            display: flex; justify-content: space-between; margin-bottom: 25px; gap: 15px;
        }
        .btn-danger {
            background: rgba(255,51,102,0.1); border: 1px solid rgba(255,51,102,0.5);
            color: #ff3366; padding: 12px 20px; border-radius: 8px; font-weight: 600;
            cursor: pointer; transition: 0.3s;
        }
        .btn-danger:hover { background: #ff3366; color: white; box-shadow: 0 0 15px rgba(255,51,102,0.4); }

        .feedbacks-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        
        .fb-card {
            background: rgba(0,0,0,0.4); padding: 25px; border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.1); position: relative;
        }
        .fb-name { font-size: 18px; font-weight: 800; color: var(--primary); margin-bottom: 5px; }
        .fb-meta { font-size: 12px; color: rgba(255,255,255,0.4); margin-bottom: 15px; }
        .fb-msg { font-size: 14px; color: rgba(255,255,255,0.8); line-height: 1.6; background: rgba(0,0,0,0.3); padding: 15px; border-radius: 8px; border-left: 3px solid var(--secondary); }
        .btn-del {
            position: absolute; top: 15px; right: 15px; background: transparent; border: none;
            color: rgba(255,51,102,0.5); cursor: pointer; transition: 0.3s;
        }
        .btn-del:hover { color: #ff3366; transform: scale(1.1); }

        @media (max-width: 768px) {
            .sidebar { width: 100%; height: 60px; top: auto; bottom: 0; flex-direction: row; padding: 0; border-right: none; border-top: 1px solid rgba(0, 242, 255, 0.2); }
            .logo { display: none; }
            .nav-links { display: flex; flex-direction: row; justify-content: space-around; align-items: center; width: 100%; }
            .nav-links a { padding: 10px; flex-direction: column; font-size: 10px; border-left: none; }
            .nav-links a.active { border-bottom: 3px solid var(--primary); background: none; border-left: none;}
            .nav-icon { margin-right: 0; margin-bottom: 5px; }
            .main-content { margin-left: 0; width: 100%; padding-bottom: 80px; }
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="logo">SONU MODS</div>
        <ul class="nav-links">
            <li><a href="dashboard.html">
                <svg class="nav-icon" viewBox="0 0 24 24"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg> Dashboard
            </a></li>
            <li><a href="users.html">
                <svg class="nav-icon" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg> User IDs
            </a></li>
            <li><a href="apps.html">
                <svg class="nav-icon" viewBox="0 0 24 24"><path d="M4 8h4V4H4v4zm6 12h4v-4h-4v4zm-6 0h4v-4H4v4zm0-6h4v-4H4v4zm6 0h4v-4h-4v4zm6-10v4h4V4h-4zm-6 4h4V4h-4v4zm6 6h4v-4h-4v4zm0 6h4v-4h-4v4z"/></svg> Apps Manager
            </a></li>
            <li><a href="keys.html">
                <svg class="nav-icon" viewBox="0 0 24 24"><path d="M21 2H3c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-8 15h-2v-2h2v2zm0-4h-2V7h2v6zm5 4h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg> Keys
            </a></li>
            <li><a href="feedbacks.html" class="active">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H5.17L4 17.17V4h16v12z"/></svg> Feedbacks
            </a></li>
        </ul>
    </aside>

    <main class="main-content">
        <header class="header">
            <h2>User Feedbacks</h2>
        </header>

        <div class="controls-bar">
            <div style="font-size: 16px; color:rgba(255,255,255,0.6); align-self:center;">
                Total Feedbacks: <strong id="fbCount" style="color:var(--primary)">0</strong>
            </div>
            <button class="btn-danger" onclick="clearAllFeedbacks()">Clear All Feedbacks</button>
        </div>

        <div class="feedbacks-grid" id="fbGrid">
            <p style="color:rgba(255,255,255,0.4);">Loading feedbacks...</p>
        </div>
    </main>

    <script>
        const fbGrid = document.getElementById('fbGrid');

        db.ref('feedbacks').on('value', snap => {
            fbGrid.innerHTML = '';
            if(!snap.exists()){
                fbGrid.innerHTML = '<p style="color:rgba(255,255,255,0.4); text-align:center; grid-column:1/-1;">No feedbacks yet.</p>';
                document.getElementById('fbCount').innerText = '0';
                return;
            }

            const data = [];
            snap.forEach(child => {
                data.push({ id: child.key, ...child.val() });
            });
            data.sort((a,b) => b.created_at - a.created_at);

            document.getElementById('fbCount').innerText = data.length;

            data.forEach(fb => {
                const dateObj = new Date(fb.created_at);
                const dStr = dateObj.toLocaleDateString() + ' ' + dateObj.toLocaleTimeString();

                const card = document.createElement('div');
                card.className = 'fb-card';
                card.innerHTML = `
                    <button class="btn-del" onclick="deleteFeedback('${fb.id}')">
                        <svg viewBox="0 0 24 24" width="20" fill="currentColor"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
                    </button>
                    <div class="fb-name">${fb.name}</div>
                    <div class="fb-meta">User ID: ${fb.user_id} &bull; ${dStr}</div>
                    <div class="fb-msg">${fb.message}</div>
                `;
                fbGrid.appendChild(card);
            });
        });

        function deleteFeedback(id) {
            if(confirm("Delete this feedback?")) {
                db.ref('feedbacks/' + id).remove();
            }
        }

        function clearAllFeedbacks() {
            if(confirm("Are you sure you want to delete ALL feedbacks?")) {
                db.ref('feedbacks').remove();
            }
        }
    </script>
</body>
</html>
