<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sonu Mods | Admin Access</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <!-- Include Firebase & Config -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="../js/config.js"></script>

    <style>
        /* === CSS VARIABLES === */
        :root {
            --primary: #00f2ff;
            --secondary: #7000ff;  
            --bg: #0a0b1e;
            --card-bg: rgba(22, 27, 51, 0.8);
            --text: #ffffff;
            --error: #ff3366;
            --success: #00ff88;
        }

        /* === GLOBAL RESET & STYLES === */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            /* Animated background glow */
            background-image: radial-gradient(circle at 50% -20%, rgba(112, 0, 255, 0.2), transparent 50%),
                              radial-gradient(circle at 50% 120%, rgba(0, 242, 255, 0.15), transparent 50%);
            animation: pulseBg 8s infinite alternate;
        }

        @keyframes pulseBg {
            0% { background-position: 0% 0%; }
            100% { background-position: 100% 100%; }
        }

        /* === LOGIN CARD === */
        .login-card {
            background: var(--card-bg);
            width: 100%;
            max-width: 420px;
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6), 
                        0 0 20px rgba(112, 0, 255, 0.2) inset,
                        0 0 15px rgba(0, 242, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            position: relative;
            z-index: 10;
            animation: slideUp 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* === TYPOGRAPHY === */
        .panel-title {
            text-align: center;
            font-size: 36px;
            font-weight: 800;
            margin-bottom: 5px;
            letter-spacing: 3px;
            background: linear-gradient(90deg, var(--primary), var(--secondary), var(--primary));
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            animation: shineText 3s linear infinite;
        }

        @keyframes shineText {
            to { background-position: 200% center; }
        }

        .panel-subtitle {
            text-align: center;
            font-size: 14px;
            font-weight: 300;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 30px;
            letter-spacing: 1px;
        }

        /* === FORM STYLES === */
        .input-group {
            position: relative;
            margin-bottom: 25px;
        }

        .input-group label {
            display: block;
            font-size: 13px;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper input {
            width: 100%;
            background-color: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--primary);
            padding: 14px 45px 14px 15px;
            border-radius: 10px;
            font-size: 16px;
            font-family: monospace;
            letter-spacing: 1px;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-wrapper input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.3);
            background-color: rgba(0, 0, 0, 0.6);
        }

        .input-wrapper input::placeholder {
            color: rgba(255, 255, 255, 0.3);
            font-family: 'Outfit', sans-serif;
            letter-spacing: normal;
        }

        /* Eye Icon Toggle Button */
        .toggle-btn {
            position: absolute;
            right: 15px;
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.5);
            cursor: pointer;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: color 0.3s ease;
        }

        .toggle-btn:hover { color: var(--primary); }
        .toggle-btn svg { width: 20px; height: 20px; fill: currentColor; }

        /* === BUTTON STYLES === */
        .login-btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(90deg, var(--secondary), var(--primary));
            background-size: 200% auto;
            color: var(--text);
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.4s ease;
            box-shadow: 0 5px 15px rgba(112, 0, 255, 0.4);
            text-transform: uppercase;
        }

        .login-btn:hover {
            background-position: right center;
            box-shadow: 0 5px 25px rgba(0, 242, 255, 0.6);
            transform: translateY(-2px);
        }

        .login-btn:active { transform: translateY(1px); }
        .login-btn:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }

        /* === STATUS MESSAGE === */
        .status-msg {
            font-size: 13px;
            text-align: center;
            margin-top: 15px;
            font-weight: 600;
            opacity: 0;
            transition: opacity 0.3s ease;
            padding: 8px;
            border-radius: 5px;
        }
        .status-error { color: var(--error); background: rgba(255,51,102,0.1); border: 1px solid rgba(255,51,102,0.3); }
        .status-success { color: var(--success); background: rgba(0,255,136,0.1); border: 1px solid rgba(0,255,136,0.3); }

        /* === SHAKE ANIMATION === */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-8px); }
            20%, 40%, 60%, 80% { transform: translateX(8px); }
        }

        .shake {
            animation: shake 0.5s ease-in-out;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), 
                        0 0 20px rgba(255, 51, 102, 0.3) inset,
                        0 0 15px rgba(255, 51, 102, 0.2) !important;
            border-color: rgba(255, 51, 102, 0.5) !important;
        }

        .back-home {
            position: absolute;
            top: 20px; left: 20px;
            color: rgba(255,255,255,0.5);
            text-decoration: none; font-size: 14px; z-index: 20; transition: 0.3s;
        }
        .back-home:hover { color: var(--primary); }

    </style>
</head>
<body>

    <a href="../index.html" class="back-home">&larr; Main Menu</a>

    <div class="login-card" id="loginCard">
        <h1 class="panel-title">SONU MODS</h1>
        <p class="panel-subtitle">Admin Security Gateway</p>

        <form id="loginForm">
            <div class="input-group">
                <label for="password">ADMIN ACCESS KEY</label>
                <div class="input-wrapper">
                    <input type="password" id="password" placeholder="Enter Valid Database Key..." autocomplete="off" required>
                    
                    <button type="button" class="toggle-btn" id="togglePassword" title="Show/Hide Key">
                        <svg id="eyeOpen" viewBox="0 0 24 24">
                            <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>
                        </svg>
                        <svg id="eyeClosed" viewBox="0 0 24 24" style="display: none;">
                            <path d="M12 7c2.76 0 5 2.24 5 5 0 .65-.13 1.26-.36 1.83l2.92 2.92c1.51-1.26 2.7-2.89 3.43-4.75-1.73-4.39-6-7.5-11-7.5-1.4 0-2.74.25-3.98.7l2.16 2.16C10.74 7.13 11.35 7 12 7zM2 4.27l2.28 2.28.46.46C3.08 8.3 1.78 10.02 1 12c1.73 4.39 6 7.5 11 7.5 1.55 0 3.03-.3 4.38-.84l.42.42L19.73 22 21 20.73 3.27 3 2 4.27zM7.53 9.8l1.55 1.55c-.05.21-.08.43-.08.65 0 1.66 1.34 3 3 3 .22 0 .44-.03.65-.08l1.55 1.55c-.67.33-1.41.53-2.2.53-2.76 0-5-2.24-5-5 0-.79.2-1.53.53-2.2zm4.31-.78l3.15 3.15.02-.16c0-1.66-1.34-3-3-3l-.17.01z"/>
                        </svg>
                    </button>
                </div>
            </div>

            <button type="submit" class="login-btn" id="loginBtn">Initialize Connection</button>
            <div class="status-msg" id="statusMsg"></div>
        </form>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        const passwordInput = document.getElementById('password');
        const togglePasswordBtn = document.getElementById('togglePassword');
        const eyeOpen = document.getElementById('eyeOpen');
        const eyeClosed = document.getElementById('eyeClosed');
        const loginCard = document.getElementById('loginCard');
        const statusMsg = document.getElementById('statusMsg');
        const loginBtn = document.getElementById('loginBtn');

        // Toggle Password Visibilty
        togglePasswordBtn.addEventListener('click', () => {
            const isPassword = passwordInput.getAttribute('type') === 'password';
            passwordInput.setAttribute('type', isPassword ? 'text' : 'password');
            eyeOpen.style.display = isPassword ? 'none' : 'block';
            eyeClosed.style.display = isPassword ? 'block' : 'none';
            passwordInput.focus();
        });

        function showMsg(text, type) {
            statusMsg.className = `status-msg status-${type}`;
            statusMsg.innerText = text;
            statusMsg.style.opacity = '1';
        }

        // Form Submission Logic
        loginForm.addEventListener('submit', (event) => {
            event.preventDefault();
            const enteredKey = passwordInput.value.trim();

            if(!enteredKey) return;

            statusMsg.style.opacity = '0';
            loginBtn.disabled = true;
            loginBtn.innerText = "Verifying Database Key...";

            // Check if the key exists in Firebase `keys` database and is valid
            // We assume if the key exists in our system, it gives admin access
            // Alternatively, we can check a specific `admin_keys` node if the user creates one later
            db.ref(`keys/${enteredKey}`).once('value')
            .then((snapshot) => {
                if (snapshot.exists()) {
                    // Valid Key Found!
                    sessionStorage.setItem('sonu_admin', 'authenticated');
                    
                    showMsg("Authorization Accepted! Redirecting...", "success");
                    
                    loginCard.style.boxShadow = "0 0 50px var(--primary)";
                    loginCard.style.transform = "scale(1.02)";
                    loginCard.style.transition = "all 0.3s ease";
                    
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 800);
                } else {
                    // Invalid Key
                    loginBtn.disabled = false;
                    loginBtn.innerText = "Initialize Connection";
                    passwordInput.value = '';
                    showMsg("Access Denied. Invalid Authorization Key.", "error");
                    
                    loginCard.classList.remove('shake');
                    void loginCard.offsetWidth; 
                    loginCard.classList.add('shake');
                    setTimeout(() => loginCard.classList.remove('shake'), 500);
                }
            })
            .catch(error => {
                loginBtn.disabled = false;
                loginBtn.innerText = "Initialize Connection";
                showMsg("Network Error connecting to Firebase.", "error");
            });
        });

        // Auto-redirect if already logged in
        if (sessionStorage.getItem('sonu_admin') === 'authenticated') {
            window.location.replace('dashboard.html');
        }
    </script>
</body>
</html>
