<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sonu Mods | User IDs</title>

    <script>
        if (sessionStorage.getItem('sonu_admin') !== 'authenticated') {
            window.location.replace('index.html');
        }
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="../js/config.js"></script>

    <style>
        /* Import variables from dashboard/apps css */
        :root {
            --primary: #00f2ff; --secondary: #7000ff; --bg: #0a0b1e;
            --card-bg: rgba(22, 27, 51, 0.8); --text: #ffffff;
            --success: #00ff88; --danger: #ff3366; --sidebar-width: 250px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body { background-color: var(--bg); color: var(--text); overflow-x: hidden; display: flex; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--secondary); border-radius: 4px; }

        /* --- SIDEBAR --- */
        .sidebar {
            width: var(--sidebar-width); height: 100vh; background: var(--card-bg);
            border-right: 1px solid rgba(0, 242, 255, 0.15); position: fixed; top: 0; left: 0;
            padding: 20px 0; display: flex; flex-direction: column; z-index: 100;
            backdrop-filter: blur(20px); box-shadow: 5px 0 20px rgba(0,0,0,0.5);
        }
        .logo { text-align: center; font-size: 26px; font-weight: 800; margin-bottom: 40px; background: linear-gradient(90deg, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: 3px; }
        .nav-links { list-style: none; flex: 1; }
        .nav-links a { display: flex; align-items: center; padding: 15px 25px; color: rgba(255,255,255,0.7); text-decoration: none; font-weight: 400; border-left: 3px solid transparent; transition: 0.3s;}
        .nav-links a:hover, .nav-links a.active { background: rgba(0, 242, 255, 0.1); color: var(--primary); border-left: 3px solid var(--primary); }
        .nav-icon { width: 22px; height: 22px; margin-right: 15px; fill: currentColor; }
        .user-panel-btn { margin: 20px; background: linear-gradient(90deg, var(--secondary), var(--primary)); padding: 12px; border-radius: 10px; text-align: center; color: white; text-decoration: none; font-weight: 600; display: flex; justify-content: center; gap: 8px; box-shadow: 0 5px 15px rgba(112,0,255,0.3); }

        /* --- MAIN CONTENT --- */
        .main-content { margin-left: var(--sidebar-width); padding: 30px; width: calc(100% - var(--sidebar-width)); min-height: 100vh; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .header h2 { font-weight: 800; font-size: 32px; }

        .content-grid { display: grid; grid-template-columns: 350px 1fr; gap: 30px; align-items: start; }

        /* --- FORM PANEL --- */
        .form-panel { background: var(--card-bg); padding: 30px; border-radius: 20px; border: 1px solid rgba(0, 242, 255, 0.3); box-shadow: 0 15px 40px rgba(0,0,0,0.6); position: sticky; top: 30px; }
        .form-panel h3 { margin-bottom: 25px; font-size: 20px; color: white; }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; font-size: 13px; color: rgba(255,255,255,0.8); margin-bottom: 8px; }
        .input-control { width: 100%; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.2); color: var(--primary); padding: 14px 15px; border-radius: 10px; font-size: 16px; outline: none; }
        .input-control:focus { border-color: var(--primary); }
        .btn-primary { width: 100%; padding: 16px; border: none; border-radius: 10px; font-weight: 800; cursor: pointer; background: linear-gradient(90deg, var(--secondary), var(--primary)); color: white; transition: 0.3s; text-transform: uppercase; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(0,242,255,0.5); }

        /* --- TABLE --- */
        .table-panel { background: var(--card-bg); padding: 25px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 14px; }
        th { color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 1px; font-weight: 600; font-size: 12px; }
        tr:hover { background: rgba(255,255,255,0.02); }
        .user-id-text { font-family: monospace; color: var(--primary); font-size: 15px; font-weight: 800; }
        
        .status-badge { padding: 4px 10px; border-radius: 6px; font-size: 12px; font-weight: 800; text-transform: uppercase; }
        .status-active { background: rgba(0,255,136,0.1); color: var(--success); border: 1px solid rgba(0,255,136,0.3); }
        .status-banned { background: rgba(255,51,102,0.1); color: var(--danger); border: 1px solid rgba(255,51,102,0.3); }

        .btn-action { background: rgba(255,255,255,0.1); border: none; color: white; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 600; transition: 0.3s; margin-right: 5px; }
        .btn-action:hover { background: var(--primary); color: var(--bg); }
        .btn-delete { background: rgba(255,51,102,0.1); color: var(--danger); }
        .btn-delete:hover { background: var(--danger); color: white; }

        @media (max-width: 1024px) { .content-grid { grid-template-columns: 1fr; } .form-panel { position: static; margin-bottom: 30px; } }
        @media (max-width: 768px) {
            .sidebar { width: 100%; height: 60px; top: auto; bottom: 0; flex-direction: row; padding: 0; }
            .logo, .user-panel-btn { display: none; }
            .nav-links { display: flex; justify-content: space-around; width: 100%; }
            .nav-links a { padding: 10px; flex-direction: column; font-size: 10px; border: none; }
            .main-content { margin-left: 0; width: 100%; padding-bottom: 80px; }
        }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="logo">SONU MODS</div>
        <ul class="nav-links">
            <li><a href="dashboard.html"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg> Dashboard</a></li>
            <li><a href="users.html" class="active"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg> User IDs</a></li>
            <li><a href="apps.html"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M4 8h4V4H4v4zm6 12h4v-4h-4v4zm-6 0h4v-4H4v4zm0-6h4v-4H4v4zm6 0h4v-4h-4v4zm6-10v4h4V4h-4zm-6 4h4V4h-4v4zm6 6h4v-4h-4v4zm0 6h4v-4h-4v4z"/></svg> Apps Manager</a></li>
            <li><a href="keys.html"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M21 2H3c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-8 15h-2v-2h2v2zm0-4h-2V7h2v6zm5 4h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg> Keys</a></li>
            <li><a href="tokens.html"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg> Tokens</a></li>
            <li><a href="history.html"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M13 3c-4.97 0-9 4.03-9 9H1l3.89 3.89.07.14L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42C8.27 19.99 10.51 21 13 21c4.97 0 9-4.03 9-9s-4.03-9-9-9zm-1 5v5l4.28 2.54.72-1.21-3.5-2.08V8H12z"/></svg> History</a></li>
        </ul>
    </aside>

    <main class="main-content">
        <header class="header">
            <h2>User Management</h2>
        </header>

        <div class="content-grid">
            <div class="form-panel">
                <h3>Create User ID</h3>
                <form id="userForm">
                    <div class="input-group">
                        <label>User's Full Name (Required)</label>
                        <input type="text" id="userName" class="input-control" placeholder="e.g. Rahul Sharma" required autocomplete="off">
                    </div>
                    <div class="input-group">
                        <label>Notes / Telegram Handle (Optional)</label>
                        <input type="text" id="userNotes" class="input-control" placeholder="@telegram_id" autocomplete="off">
                    </div>
                    <button type="submit" class="btn-primary" id="btnGenerate">Generate ID</button>
                </form>
            </div>

            <div class="table-panel">
                <table>
                    <thead>
                        <tr>
                            <th>User ID</th>
                            <th>Name</th>
                            <th>Status</th>
                            <th>Created Date</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="userTableBody">
                        <tr><td colspan="5" style="text-align:center; color:rgba(255,255,255,0.4);">Loading data...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        // Form Logic
        document.getElementById('userForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const name = document.getElementById('userName').value.trim();
            const notes = document.getElementById('userNotes').value.trim();
            const btn = document.getElementById('btnGenerate');

            if(!name) return alert("Name is compulsory!");

            btn.disabled = true;
            btn.innerText = "Generating...";

            // Generate USR-XXXXXX
            const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
            let randomCode = '';
            for(let i=0; i<6; i++) randomCode += chars.charAt(Math.floor(Math.random() * chars.length));
            const newId = `USR-${randomCode}`;

            db.ref(`users/${newId}`).set({
                user_id: newId,
                name: name,
                notes: notes,
                status: 'active',
                device_id: 'NOT_SET',
                last_key: null,
                created_at: Date.now()
            }).then(() => {
                document.getElementById('userForm').reset();
                btn.disabled = false;
                btn.innerText = "Generate ID";
            }).catch(err => {
                alert("Error saving user!");
                btn.disabled = false;
            });
        });

        // Fetch Data
        db.ref('users').on('value', snap => {
            const tbody = document.getElementById('userTableBody');
            tbody.innerHTML = '';

            if(!snap.exists()) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;">No Users Found.</td></tr>';
                return;
            }

            const arr = [];
            snap.forEach(child => { arr.push(child.val()); });
            arr.sort((a,b) => b.created_at - a.created_at);

            arr.forEach(user => {
                const dateObj = new Date(user.created_at);
                const dateStr = dateObj.toLocaleDateString() + ' ' + dateObj.toLocaleTimeString();

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><span class="user-id-text">${user.user_id}</span></td>
                    <td><strong style="color:white;">${user.name}</strong><br><span style="font-size:11px;color:rgba(255,255,255,0.5)">${user.notes || '-'}</span></td>
                    <td><span class="status-badge ${user.status === 'active' ? 'status-active' : 'status-banned'}">${user.status}</span></td>
                    <td>${dateStr}</td>
                    <td>
                        <button class="btn-action" onclick="copyText('${user.user_id}')">Copy</button>
                        <button class="btn-action" onclick="toggleStatus('${user.user_id}', '${user.status}')">${user.status === 'active' ? 'Ban' : 'Unban'}</button>
                        <button class="btn-action btn-delete" onclick="deleteUser('${user.user_id}')">Delete</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        });

        function copyText(text) {
            navigator.clipboard.writeText(text).then(() => alert(text + " Copied!"));
        }

        function toggleStatus(id, currentStatus) {
            const newStatus = currentStatus === 'active' ? 'banned' : 'active';
            db.ref(`users/${id}`).update({ status: newStatus });
        }

        function deleteUser(id) {
            if(confirm("Are you sure you want to delete this user? This will move them to History.")) {
                db.ref(`users/${id}`).once('value').then(snap => {
                    const data = snap.val();
                    data.deleted_at = Date.now();
                    // Move to history
                    db.ref(`history_users/${id}`).set(data).then(() => {
                        db.ref(`users/${id}`).remove();
                    });
                });
            }
        }
    </script>
</body>
</html>
