<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sonu Mods | Reseller Login</title>

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="../js/config.js"></script>

    <style>
        :root {
            --primary: #00f2ff;
            --secondary: #7000ff;
            --bg: #0a0b1e;
            --card-bg: rgba(22, 27, 51, 0.75);
            --text: #ffffff;
            --warning: #ffaa00;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body { background-color: var(--bg); color: var(--text); min-height: 100vh; display: flex; justify-content: center; align-items: center; position: relative; overflow: hidden; }

        .login-card {
            background: var(--card-bg); width: 100%; max-width: 400px; padding: 40px 30px;
            border-radius: 20px; border: 1px solid rgba(255,170,0,0.3);
            box-shadow: 0 10px 40px rgba(0,0,0,0.6), 0 0 20px rgba(255,170,0,0.1) inset;
            backdrop-filter: blur(15px); position: relative; z-index: 10;
        }

        .logo-title {
            text-align: center; font-size: 32px; font-weight: 800; margin-bottom: 5px;
            color: var(--warning); letter-spacing: 2px; text-transform: uppercase;
            text-shadow: 0 0 15px rgba(255,170,0,0.5);
        }
        .subtitle { text-align: center; font-size: 14px; color: rgba(255,255,255,0.6); margin-bottom: 30px; }

        .input-group { margin-bottom: 25px; }
        .input-group label { display: block; font-size: 13px; color: rgba(255,255,255,0.8); margin-bottom: 8px; }
        .input-control {
            width: 100%; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1);
            color: white; padding: 15px; border-radius: 10px; font-size: 16px; outline: none; transition: 0.3s;
        }
        .input-control:focus { border-color: var(--warning); box-shadow: 0 0 15px rgba(255,170,0,0.3); }

        .login-btn {
            width: 100%; padding: 16px; border: none; border-radius: 10px;
            background: linear-gradient(90deg, #ff6a00, var(--warning)); color: #000;
            font-size: 16px; font-weight: 800; text-transform: uppercase; cursor: pointer; transition: 0.3s;
        }
        .login-btn:hover { box-shadow: 0 5px 20px rgba(255,170,0,0.5); transform: translateY(-2px); }
        .login-btn:disabled { opacity: 0.7; cursor: not-allowed; }

        .msg-box { margin-top: 15px; padding: 10px; border-radius: 8px; text-align: center; font-size: 14px; display: none; }
        .msg-error { background: rgba(255,51,102,0.1); color: #ff3366; border: 1px solid rgba(255,51,102,0.3); }

        .back-home { position: absolute; top: 20px; left: 20px; color: rgba(255,255,255,0.5); text-decoration: none; font-size: 14px; z-index: 20; }
        .back-home:hover { color: var(--warning); }
    </style>
</head>
<body>
    <a href="../index.html" class="back-home">&larr; Main Menu</a>

    <div class="login-card">
        <h1 class="logo-title">RESELLER PORTAL</h1>
        <p class="subtitle">Authorized Sellers Only</p>

        <form id="sellerLoginForm">
            <div class="input-group">
                <label>Seller Username</label>
                <input type="text" id="username" class="input-control" required autocomplete="off">
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password" class="input-control" required>
            </div>
            <button type="submit" class="login-btn" id="loginBtn">Login</button>
            <div class="msg-box" id="msgBox"></div>
        </form>
    </div>

    <script>
        if (sessionStorage.getItem('sonu_seller')) {
            window.location.replace('dashboard.html');
        }

        const form = document.getElementById('sellerLoginForm');
        const msgBox = document.getElementById('msgBox');
        const btn = document.getElementById('loginBtn');

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            btn.disabled = true; btn.innerText = "Checking...";
            msgBox.style.display = 'none';

            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value;

            db.ref(`sellers/${user}`).once('value').then(snap => {
                if(snap.exists()) {
                    const data = snap.val();
                    if(data.password === pass) {
                        sessionStorage.setItem('sonu_seller', user);
                        window.location.replace('dashboard.html');
                    } else {
                        showError("Invalid Password!");
                    }
                } else {
                    showError("Seller not found!");
                }
            }).catch(err => {
                showError("Network Error!");
            });
        });

        function showError(msg) {
            btn.disabled = false; btn.innerText = "Login";
            msgBox.className = 'msg-box msg-error';
            msgBox.innerText = msg;
            msgBox.style.display = 'block';
        }
    </script>
</body>
</html>
