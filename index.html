<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sonu Mods | Welcome</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00f2ff;
            --secondary: #7000ff;
            --bg: #0a0b1e;
            --card-bg: rgba(22, 27, 51, 0.7);
            --text: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Animated Background Gradients */
        .bg-gradient {
            position: absolute;
            width: 150vw;
            height: 150vh;
            background: radial-gradient(circle at 50% 50%, rgba(112, 0, 255, 0.15), transparent 60%),
                        radial-gradient(circle at 80% 20%, rgba(0, 242, 255, 0.1), transparent 50%);
            animation: pulseBg 10s infinite alternate;
            z-index: 1;
        }

        @keyframes pulseBg {
            0% { transform: scale(1) translate(0, 0); }
            100% { transform: scale(1.1) translate(-2%, -2%); }
        }

        /* Particles */
        #particles {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; pointer-events: none;
        }
        .particle {
            position: absolute;
            background: var(--primary);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--primary);
            opacity: 0.5;
            animation: float 15s linear infinite;
        }
        @keyframes float {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            50% { opacity: 0.8; }
            100% { transform: translateY(-100vh) scale(1); opacity: 0; }
        }

        .container {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 20px;
            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Glitch / Glow Title Effect */
        .title {
            font-size: 64px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-bottom: 10px;
            background: linear-gradient(90deg, var(--primary), var(--secondary), var(--primary));
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shineText 3s linear infinite;
            filter: drop-shadow(0 0 20px rgba(0, 242, 255, 0.5));
        }

        @keyframes shineText {
            to { background-position: 200% center; }
        }

        .subtitle {
            font-size: 18px;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 50px;
            letter-spacing: 2px;
        }

        /* Cards Container */
        .cards {
            display: flex;
            gap: 30px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .portal-card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 20px;
            width: 300px;
            text-decoration: none;
            color: white;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .portal-card::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            transform: skewX(-20deg);
            transition: left 0.5s;
        }

        .portal-card:hover {
            transform: translateY(-10px) scale(1.05);
            border-color: var(--primary);
            box-shadow: 0 15px 40px rgba(0, 242, 255, 0.3), inset 0 0 20px rgba(0, 242, 255, 0.1);
        }

        .portal-card:hover::before {
            left: 200%;
        }

        .portal-icon {
            width: 60px;
            height: 60px;
            margin: 0 auto 20px;
            fill: var(--primary);
            transition: transform 0.3s;
        }

        .portal-card:nth-child(2) .portal-icon {
            fill: var(--secondary);
        }
        .portal-card:nth-child(2):hover {
            border-color: var(--secondary);
            box-shadow: 0 15px 40px rgba(112, 0, 255, 0.3), inset 0 0 20px rgba(112, 0, 255, 0.1);
        }

        .portal-card:nth-child(3) .portal-icon {
            fill: #ffaa00; /* Warning/Orange color */
        }
        .portal-card:nth-child(3):hover {
            border-color: #ffaa00;
            box-shadow: 0 15px 40px rgba(255, 170, 0, 0.3), inset 0 0 20px rgba(255, 170, 0, 0.1);
        }

        .portal-card:hover .portal-icon {
            transform: scale(1.2);
        }

        .portal-title {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .portal-desc {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.5);
        }

        @media (max-width: 768px) {
            .title { font-size: 42px; }
            .cards { flex-direction: column; align-items: center; }
            .portal-card { width: 100%; max-width: 320px; }
        }
    </style>
</head>
<body>

    <div class="bg-gradient"></div>
    <div id="particles"></div>

    <div class="container">
        <h1 class="title">Sonu Mods</h1>
        <p class="subtitle">Ultimate Management Gateway</p>

        <div class="cards">
            <!-- User Gateway -->
            <a href="user/index.html" class="portal-card">
                <svg class="portal-icon" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                <h2 class="portal-title">User Gateway</h2>
                <p class="portal-desc">Access to token redemption and key generation for users.</p>
            </a>

            <!-- Admin Panel -->
            <a href="panel/index.html" class="portal-card">
                <svg class="portal-icon" viewBox="0 0 24 24"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg>
                <h2 class="portal-title">Admin Panel</h2>
                <p class="portal-desc">Manage keys, apps, shorteners, and system configurations.</p>
            </a>

            <!-- Reseller Portal -->
            <a href="seller/index.html" class="portal-card">
                <svg class="portal-icon" viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
                <h2 class="portal-title">Reseller Portal</h2>
                <p class="portal-desc">Seller gateway to generate keys within quota limits.</p>
            </a>
        </div>
    </div>

    <script>
        // Floating Particles Logic
        function initParticles() {
            const container = document.getElementById('particles');
            const particleCount = window.innerWidth < 768 ? 20 : 50;

            for (let i = 0; i < particleCount; i++) {
                let p = document.createElement('div');
                p.className = 'particle';
                let size = Math.random() * 5 + 2;
                p.style.width = size + 'px';
                p.style.height = size + 'px';
                p.style.left = Math.random() * 100 + 'vw';
                p.style.animationDuration = (Math.random() * 10 + 10) + 's';
                p.style.animationDelay = (Math.random() * 5) + 's';
                
                // Randomly color some particles purple
                if(Math.random() > 0.5) {
                    p.style.background = 'var(--secondary)';
                    p.style.boxShadow = '0 0 10px var(--secondary)';
                }
                
                container.appendChild(p);
            }
        }
        initParticles();
    </script>
</body>
</html>
